<script>

function normalizeText(text) {

  return text
    .replace(/\r/g, '')
    .replace(/\t/g, ' ')
    .replace(/•/g, ' ')
    .replace(//g, ' ')
    .replace(/\s{2,}/g, ' ')
    .trim();

}

function extractDetails() {

  const rawText = document.getElementById('resume').value;

  const text = normalizeText(rawText);

  const lines = rawText
    .split('\n')
    .map(line => line.trim())
    .filter(line => line.length > 0);

  // ========================
  // NAME
  // ========================

  let fullName = '';

  for (let line of lines) {

    if (
      line.length > 3 &&
      line.length < 60 &&
      !line.includes('@') &&
      !line.match(/\d{4}/) &&
      !line.toLowerCase().includes('page')
    ) {

      fullName = line;
      break;

    }
  }

  // ========================
  // EMAIL
  // ========================

  const emailMatch = text.match(
    /[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}/i
  );

  const email = emailMatch ? emailMatch[0] : '';

  // ========================
  // PHONE
  // ========================

  const phoneMatch = text.match(
    /(\+?\d[\d\s\-]{7,})/
  );

  const phone = phoneMatch ? phoneMatch[0] : '';

  // ========================
  // LOCATION
  // ========================

  let location = '';

  const locationPatterns = [
    /([A-Za-z\s]+,\s*Malaysia)/i,
    /([A-Za-z\s]+,\s*Singapore)/i,
    /([A-Za-z\s]+,\s*Hong Kong)/i,
    /([A-Za-z\s]+,\s*Negeri Sembilan)/i,
    /([A-Za-z\s]+,\s*Selangor)/i
  ];

  for (let pattern of locationPatterns) {

    const match = text.match(pattern);

    if (match) {

      location = match[0];
      break;

    }
  }

  // ========================
  // EXPERIENCE YEARS
  // ========================

  let experience = '';

  const expPatterns = [
    /(\d+)\+?\s+years?\s+working\s+experience/i,
    /(\d+)\+?\s+years?\s+of\s+experience/i
  ];

  for (let pattern of expPatterns) {

    const match = text.match(pattern);

    if (match) {

      experience = match[1] + '+ years';
      break;

    }
  }

  // ========================
  // SALARY
  // ========================

  let salary = '';

  const salaryMatch = text.match(
    /(RM|HK\$|SGD)\s?[\d,]+(?:\/month)?/i
  );

  if (salaryMatch) {

    salary = salaryMatch[0];

  }

  // ========================
  // NOTICE PERIOD
  // ========================

  let notice = '';

  const noticeKeywords = [
    'Immediately Available',
    'Immediate',
    '1 Month',
    '2 Months',
    '3 Months'
  ];

  noticeKeywords.forEach(keyword => {

    if (
      text.toLowerCase().includes(keyword.toLowerCase()) &&
      notice === ''
    ) {

      notice = keyword;

    }

  });

  // ========================
  // CURRENT ROLE + COMPANY
  // ========================

  let currentTitle = '';
  let currentCompany = '';

  const employmentHeaders = [
    'employment history',
    'working experiences',
    'experience',
    'professional experience'
  ];

  let employmentIndex = -1;

  lines.forEach((line, index) => {

    employmentHeaders.forEach(header => {

      if (
        line.toLowerCase().includes(header)
      ) {

        employmentIndex = index;

      }

    });

  });

  if (employmentIndex !== -1) {

    for (let i = employmentIndex; i < lines.length; i++) {

      const line = lines[i];

      // Skip dates/pages/contracts
      if (
        line.match(/\d{4}/) ||
        line.toLowerCase().includes('page') ||
        line.toLowerCase().includes('permanent') ||
        line.toLowerCase().includes('contract')
      ) {

        continue;

      }

      // Stop scanning when responsibilities begin
      if (
        line.toLowerCase().includes('responsibilities')
      ) {

        break;

      }

      // Pattern:
      // Aspiro Sdn Bhd (HR Analyst)

      const bracketPattern = line.match(
        /(.*)\((.*)\)/
      );

      if (bracketPattern) {

        currentCompany = bracketPattern[1]
          .trim();

        currentTitle = bracketPattern[2]
          .trim();

        break;

      }

      // Pattern:
      // HR Analyst, DHL Shared Services

      const commaPattern = line.match(
        /^(.+?),\s(.+)$/
      );

      if (
        commaPattern &&
        !commaPattern[1].match(/\d{4}/)
      ) {

        currentTitle = commaPattern[1]
          .trim();

        currentCompany = commaPattern[2]
          .trim();

        break;

      }

    }

  }

  // ========================
  // LANGUAGES
  // ========================

  const languageDatabase = [
    'English',
    'Malay',
    'Bahasa Malaysia',
    'Mandarin',
    'Chinese',
    'Cantonese',
    'Indonesia'
  ];

  const detectedLanguages = [];

  languageDatabase.forEach(language => {

    if (
      text.toLowerCase().includes(language.toLowerCase())
    ) {

      detectedLanguages.push(language);

    }

  });

  // ========================
  // SKILLS
  // ========================

  const skillsDatabase = [
    'SAP',
    'Oracle',
    'SPSS',
    'Microsoft Office',
    'Excel',
    'Pivot Table',
    'HRIS',
    'Payroll',
    'Compensation',
    'Benefits',
    'Recruitment',
    'Stakeholder Management',
    'Business Development',
    'CRM',
    'Salesforce',
    'Data Management',
    'Reporting',
    'Analysis'
  ];

  const detectedSkills = [];

  skillsDatabase.forEach(skill => {

    if (
      text.toLowerCase().includes(skill.toLowerCase())
    ) {

      detectedSkills.push(skill);

    }

  });

  // ========================
  // FILL FIELDS
  // ========================

  document.getElementById('name').value = fullName;
  document.getElementById('email').value = email;
  document.getElementById('phone').value = phone;
  document.getElementById('title').value = currentTitle;
  document.getElementById('company').value = currentCompany;
  document.getElementById('location').value = location;
  document.getElementById('experience').value = experience;
  document.getElementById('salary').value = salary;
  document.getElementById('notice').value = notice;
  document.getElementById('languages').value = detectedLanguages.join(', ');
  document.getElementById('skills').value = detectedSkills.join(', ');

}

</script>
